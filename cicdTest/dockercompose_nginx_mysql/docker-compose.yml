services:
  nginx:
    image: nginx:latest
    container_name: nginx-container
    ports:
      - "8080:80"
    volumes:
      - .\nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: my123
      MYSQL_DATABASE: mydb
      MYSQL_USER: scott
      MYSQL_PASSWORD: tiger
    volumes:
      - .\init.sql:/docker-entrypoint-initdb.d/init.sql
      - C:\cicdTest\dockercompose_nginx_mysql\mysql_data:/var/lib/mysql

    ports:
      - "3306:3306"

volumes:
  mysql_data:
    driver: local
