services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - .\nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask_app

  flask_app:
    build: ./python-app
    container_name: flask-container
    environment:
      DB_HOST: mysql
      DB_USER: scott
      DB_PASS: tiger
      DB_NAME: mydb
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: my123
      MYSQL_DATABASE: mydb
      MYSQL_USER: scott
      MYSQL_PASSWORD: tiger
    volumes:
      - .\init.sql:/docker-entrypoint-initdb.d/init.sql
      - C:\cicdTest\mysql_data:/var/lib/mysql
