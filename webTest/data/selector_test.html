<html>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
	<style>
		/* 1. 전체 선택자 */
		/* *{
			color: blue;
		} */
		
		/* 2. 태그 선택자*/
		h1, h2 {
			/* color: blueviolet; */
		}

		/* 3. 아이디 선택자*/
		#mydiv{
			/* color: red; */
		}

		/* 4. 클래스선택자*/
		.my {
			/* color: red; */
		}
		h1,.my {
			/* color: red; */
		}

		/* 5. 속성 선택자*/
		[src]{
			/* border: 3px solid red; */
		}

		img[src] {
			/* border: 3px solid red; */
		}
		
		/* 6. 문자열 속성 선택자*/
		[src="image/a.jpg"]{
			/* border: 3px solid red; */
		} /*선택자[속성=값] : 특정한 속성 안의 값이 특정값과 같은 문서 객체를 선택*/

		[src*="jpg"]{
			/* border: 3px solid red; */
		} /*선택자[속성*=값] : 속성 안의 값이 특정 값을 포함하는 태그를 선택*/

		[src^="jpg"]{
			/* border: 3px solid red; */
		} /*선택자[속성^=값] : 속성 안의 값이 특정 값으로 시작하는 태그를 선택*/

		/* 7. 후손 선택자*/
		#mydiv span {
			/* border: 3px solid red; */
		} /*선택자A 선택자B : 선택자A의 후손에 위치하는 선택자B를 선택*/

		/* 8. 자손 선택자*/
		#mydiv > span {
			/* border: 3px solid red; */
		} /*선택자A > 선택자B : 선택자A의 자손에 위치하는 선택자B를 선택*/

		.fruit li {
			/* color: red; */
		}

		/* 9. 동위(형제) 선택자*/
		.f + li {
			/* color: red; */
		} /* 선택자A + 선택자B : 선택자A 바로 뒤에 위치한 선택자B를 선택*/

		.f ~ li {
			/* color: red; */
		} /* 선택자A ~ 선택자B : 선택자A 뒤에 위치하는 모든 선택자B를 선택*/

		/*10. 구조 선택자*/
		.fruit > li:first-child {
			/* color: red; */
		} /* :first-child : 첫 번째에 위치하는 자손을 선택*/

		.fruit > li:last-child{
			/* color: red; */
		} /* :last-child : 마지막에 위치하는 자손을 선택*/

		.fruit > li:nth-child(2) {
			/* color: red; */
		} /* :nth-child(수열) : 앞에서 수열 번째에 있는 자손을 선택*/

		.fruit > li:nth-child(2n) {
			color: red;
		} /* :nth-child(수열) : 앞에서 수열 번째에 있는 자손을 선택*/

	</style>
<body>
	<h1>테스트1</h1>
	<h1 class="my">테스트2</h1>
	<h1 id="myh2">테스트3</h1>
	<h2>테스트3-1</h2>
	<div id="mydiv">
		<span class="my">테스트4</span>
		<div><span>테스트5</span></div>
	</div>
	<ul class="fruit">
		<li class="f">사과</li>
		<li>딸기</li>
		<li>포도</li>
		<li>수박</li>
		<li>키위</li>
		<li>메론</li>
	</ul>
	<ul class="biz">
		<li>회사1</li>
		<li>회사2</li>
		<li>회사3</li>
	</ul>
	<img src="image/a.jpg"><br>
	<img src="image/b.jpg">
</body>
</html>
